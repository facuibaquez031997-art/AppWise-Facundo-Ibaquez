<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestor de Tareas</title>
  </head>
  <body>
    <main>
        <h1>Gestor de Tareas</h1>
        <section>
            <input type="text" placeholder="¿Qué necesitas hacer hoy?">
            <button type="submit">Agregar Tarea</button>
            <ul>
                <li>
                    <input type="checkbox" checked>
                    <span>Estudiar etiquetas semánticas</span>
                    <button type="button">Borrar</button>
                </li>
                <li>
                    <input type="checkbox">
                    <span>Tomar 2 litros de agua</span>
                    <button type="button">Borrar</button>
                </li>
                <li>
                    <input type="checkbox">
                    <span>Avanzar en el proyecto de GitHub</span>
                    <button type="button">Borrar</button>
                </li>
            </ul>
            <p>Tienes 2 tareas pendientes.</p>
            <button type="reset">Limpiar completadas</button>
        </section>
    </main>
  </body>
</html>
