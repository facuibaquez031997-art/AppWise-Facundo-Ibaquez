<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tienda Appwise</title>
</head>
<body>
    <header>
        <h1>
            Appwise Store
        </h1>
        <button>🛒 Ver Carrito (2)</button>
    </header>
    <main>
        <section>
            <h2>
                Nuestros Productos
            </h2>
            <article>
                <img src="assets/auricular_gamer.webp" alt="Auricular tipo gamer.">
                <h3>Auricular inalámbrico</h3>
                <p><strong>$49,99</strong></p>
                <button type="submit">Añadir al Carrito</button>
            </article>
            <article>
                <img src="assets/mouse_gamer.webp" alt="Mouse gamer RGB">
                <h3>Mouse Gamer RGB</h3>
                <p><strong>$29,99</strong></p>
                <button type="submit">Añadir al carrito</button>
            </article>
            <article>
                <img src="assets/teclado_mecanico.webp" alt="Teclado mecánico">
                <h3>Teclado Mecánico</h3>
                <p><strong>$99,99</strong></p>
                <button>Añadir al carrito</button>
            </article>
        </section>
        <aside>
            <h2>Resumen de Compra</h2>
            <ul>
                <li>Auricular inalámbrico</li><button type="button">❌</button>
                <li>Mouse Gamer RGB</li><button type="button">❌</button>
            </ul>
            <hr>
            <h3>Total: $79,98</h3>
            <button type="submit">Finalizar Compra</button>
        </aside>
    </main>
</body>
</html>
